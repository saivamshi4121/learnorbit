<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;700;800;900&family=Barlow+Condensed:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background:#020a1a}

#stage{width:100%;height:100vh;position:relative;display:flex;align-items:center;justify-content:center}

canvas#bgc{position:absolute;inset:0;width:100%;height:100%;z-index:0}
canvas#fxc{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}

#centerpiece{position:absolute;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}

#ring-svg{position:absolute;z-index:3;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

#brand-block{position:relative;z-index:6;text-align:center;opacity:0;transform:translateY(24px);transition:opacity 0.9s ease,transform 0.9s ease}
#brand-block.show{opacity:1;transform:translateY(0)}

.brand-row{display:flex;align-items:baseline;justify-content:center;line-height:1}
.b-learn{font-family:'Barlow',sans-serif;font-size:72px;font-weight:900;letter-spacing:-2px;color:#c8dcff}
.b-orbit{font-family:'Barlow',sans-serif;font-size:72px;font-weight:900;letter-spacing:-2px;color:#2979ff}

.sub-line{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:300;letter-spacing:8px;text-transform:uppercase;color:rgba(100,160,255,0.55);margin-top:6px}

.divider-line{width:0;height:1px;background:linear-gradient(90deg,transparent,#2979ff,#00e5ff,transparent);margin:14px auto;transition:width 1.2s ease}
.divider-line.expand{width:320px}

.tagline-row{font-family:'Barlow',sans-serif;font-size:15px;font-weight:300;letter-spacing:3px;color:rgba(160,200,255,0.5);opacity:0;transition:opacity 1s ease 0.3s}
.tagline-row.show{opacity:1}

#logo-canvas{position:absolute;z-index:4;top:50%;left:50%;transform:translate(-50%,-50%)}

.pulse-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid rgba(41,121,255,0.3);z-index:2;animation:pulseOut 3s ease-out infinite}
.pulse-ring:nth-child(2){animation-delay:1s}
.pulse-ring:nth-child(3){animation-delay:2s}
@keyframes pulseOut{
  0%{width:160px;height:160px;opacity:0.6}
  100%{width:400px;height:400px;opacity:0}
}

#scan-line{position:absolute;z-index:7;width:100%;height:2px;background:linear-gradient(90deg,transparent 0%,rgba(41,121,255,0) 20%,rgba(0,229,255,0.7) 50%,rgba(41,121,255,0) 80%,transparent 100%);top:0;animation:scanDown 2.2s cubic-bezier(0.4,0,0.6,1) 0.3s both;pointer-events:none}
@keyframes scanDown{0%{top:0;opacity:1}100%{top:100%;opacity:0}}

#vignette{position:absolute;inset:0;z-index:2;background:radial-gradient(ellipse at center,transparent 30%,rgba(2,10,26,0.7) 100%);pointer-events:none}

#corner-tl,#corner-tr,#corner-bl,#corner-br{position:absolute;z-index:8;width:32px;height:32px;opacity:0;transition:opacity 0.6s ease 2s}
#corner-tl{top:24px;left:24px;border-top:1.5px solid rgba(41,121,255,0.5);border-left:1.5px solid rgba(41,121,255,0.5)}
#corner-tr{top:24px;right:24px;border-top:1.5px solid rgba(41,121,255,0.5);border-right:1.5px solid rgba(41,121,255,0.5)}
#corner-bl{bottom:24px;left:24px;border-bottom:1.5px solid rgba(41,121,255,0.5);border-left:1.5px solid rgba(41,121,255,0.5)}
#corner-br{bottom:24px;right:24px;border-bottom:1.5px solid rgba(41,121,255,0.5);border-right:1.5px solid rgba(41,121,255,0.5)}
.corner-show{opacity:1!important}

#status-bar{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);z-index:8;display:flex;align-items:center;gap:16px;opacity:0;transition:opacity 0.8s ease}
#status-bar.show{opacity:1}
.status-dot{width:6px;height:6px;border-radius:50%;background:#2979ff;animation:blink 1.4s ease-in-out infinite}
.status-dot:nth-child(3){animation-delay:0.3s}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:1}}
.status-txt{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(100,160,255,0.4)}
</style>

<div id="stage">
  <canvas id="bgc"></canvas>
  <canvas id="fxc"></canvas>
  <div id="vignette"></div>
  <div id="scan-line"></div>

  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>

  <canvas id="logo-canvas" width="240" height="240"></canvas>

  <div id="brand-block">
    <div class="brand-row">
      <span class="b-learn">LEARN</span><span class="b-orbit">ORBIT</span>
    </div>
    <div class="sub-line">Intelligence · First · Learning</div>
    <div class="divider-line" id="divLine"></div>
    <div class="tagline-row" id="tagLine">Powered by AI &nbsp;·&nbsp; Built for Scale</div>
  </div>

  <div id="corner-tl"></div>
  <div id="corner-tr"></div>
  <div id="corner-bl"></div>
  <div id="corner-br"></div>

  <div id="status-bar">
    <div class="status-dot"></div>
    <div class="status-txt">System Online</div>
    <div class="status-dot"></div>
  </div>
</div>

<script>
const bgc=document.getElementById('bgc');
const bctx=bgc.getContext('2d');
const fxc=document.getElementById('fxc');
const fctx=fxc.getContext('2d');

function resize(){
  bgc.width=bgc.offsetWidth; bgc.height=bgc.offsetHeight;
  fxc.width=fxc.offsetWidth; fxc.height=fxc.offsetHeight;
}
resize();

const stars=[];
for(let i=0;i<220;i++){
  stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.6+0.2,a:Math.random()*0.8+0.1,sp:Math.random()*0.02+0.004,ph:Math.random()*Math.PI*2,color:Math.random()<0.15?'180,220,255':'210,225,255'})
}

const meteors=[];
function spawnMeteor(){
  meteors.push({x:Math.random()*bgc.width*1.5,y:-10,len:Math.random()*120+60,speed:Math.random()*8+6,alpha:1,angle:Math.PI*0.75+Math.random()*0.2})
}

let gt=0;
function drawBg(){
  bctx.clearRect(0,0,bgc.width,bgc.height);
  const grd=bctx.createRadialGradient(bgc.width/2,bgc.height/2,0,bgc.width/2,bgc.height/2,bgc.width*0.8);
  grd.addColorStop(0,'#071530');
  grd.addColorStop(0.5,'#040d1f');
  grd.addColorStop(1,'#020810');
  bctx.fillStyle=grd;
  bctx.fillRect(0,0,bgc.width,bgc.height);

  gt+=0.018;
  stars.forEach(s=>{
    const tw=s.a*(0.4+0.6*Math.sin(gt*s.sp*55+s.ph));
    bctx.beginPath();
    bctx.arc(s.x*bgc.width,s.y*bgc.height,s.r,0,Math.PI*2);
    bctx.fillStyle=`rgba(${s.color},${tw})`;
    bctx.fill();
  });

  if(Math.random()<0.012) spawnMeteor();
  for(let i=meteors.length-1;i>=0;i--){
    const m=meteors[i];
    const ex=m.x+Math.cos(m.angle)*m.len;
    const ey=m.y+Math.sin(m.angle)*m.len;
    const mg=bctx.createLinearGradient(m.x,m.y,ex,ey);
    mg.addColorStop(0,`rgba(180,220,255,0)`);
    mg.addColorStop(0.6,`rgba(200,230,255,${m.alpha*0.7})`);
    mg.addColorStop(1,`rgba(255,255,255,${m.alpha})`);
    bctx.beginPath();
    bctx.moveTo(m.x,m.y);
    bctx.lineTo(ex,ey);
    bctx.strokeStyle=mg;
    bctx.lineWidth=1.5;
    bctx.stroke();
    m.x+=Math.cos(m.angle)*m.speed;
    m.y+=Math.sin(m.angle)*m.speed;
    m.alpha-=0.025;
    if(m.alpha<=0) meteors.splice(i,1);
  }
  requestAnimationFrame(drawBg);
}
drawBg();

const lc=document.getElementById('logo-canvas');
const lctx=lc.getContext('2d');
const LCX=120,LCY=120,OR=80;
let angle=0,introPhase=0,introT=0;
const NSAT=3;
const satBases=[-Math.PI/2, Math.PI*0.47, Math.PI*1.05];
const satColors=['#2979ff','#1a5ce0','#1856cc'];
const satHighlight=['#82b1ff','#5e92f3','#5585e8'];

function easeOut(t){return 1-Math.pow(1-t,3)}
function easeInOut(t){return t<0.5?4*t*t*t:(1-Math.pow(-2*t+2,3)/2)}

let introStarted=false;
let introProgress=0;

function drawLogo(iP){
  lctx.clearRect(0,0,240,240);

  const p=Math.min(iP,1);

  lctx.save();
  lctx.globalAlpha=easeOut(Math.min(p*1.5,1));

  const arcGrd=lctx.createLinearGradient(40,120,200,120);
  arcGrd.addColorStop(0,'rgba(10,32,100,0)');
  arcGrd.addColorStop(0.3,'#0d2560');
  arcGrd.addColorStop(0.7,'#122e78');
  arcGrd.addColorStop(1,'rgba(10,32,100,0)');
  lctx.beginPath();
  lctx.arc(LCX,LCY,OR+8,Math.PI*0.55,Math.PI*2.45);
  lctx.strokeStyle=arcGrd;
  lctx.lineWidth=16;
  lctx.lineCap='round';
  lctx.stroke();
  lctx.restore();

  const planetP=easeOut(Math.max(0,(p-0.15)*1.4));
  if(planetP>0){
    lctx.save();
    lctx.globalAlpha=planetP;
    const pg=lctx.createRadialGradient(LCX-12,LCY-14,4,LCX,LCY,46);
    pg.addColorStop(0,'#4a9eff');
    pg.addColorStop(0.35,'#1f6ee8');
    pg.addColorStop(0.7,'#1448c0');
    pg.addColorStop(1,'#0a2060');
    lctx.beginPath();
    lctx.arc(LCX,LCY,46,0,Math.PI*2);
    lctx.fillStyle=pg;
    lctx.fill();

    lctx.beginPath();
    lctx.ellipse(LCX-8,LCY-12,18,10,Math.PI*-0.22,0,Math.PI*2);
    lctx.fillStyle='rgba(255,255,255,0.12)';
    lctx.fill();
    lctx.restore();
  }

  lctx.save();
  lctx.globalAlpha=easeOut(Math.max(0,(p-0.1)*1.3))*0.55;
  lctx.beginPath();
  lctx.arc(LCX,LCY,OR,0,Math.PI*2);
  lctx.strokeStyle='#1a4aaa';
  lctx.lineWidth=1.5;
  lctx.setLineDash([5,4]);
  lctx.stroke();
  lctx.setLineDash([]);
  lctx.restore();

  for(let i=0;i<NSAT;i++){
    const satP=easeOut(Math.max(0,(p-(0.3+i*0.12))*2.5));
    if(satP<=0) continue;
    const a=satBases[i]+angle;
    const sx=LCX+OR*Math.cos(a);
    const sy=LCY+OR*Math.sin(a);

    lctx.save();
    lctx.globalAlpha=satP;

    const armGrd=lctx.createLinearGradient(LCX,LCY,sx,sy);
    armGrd.addColorStop(0,'rgba(41,121,255,0.9)');
    armGrd.addColorStop(1,'rgba(41,121,255,0.3)');
    lctx.beginPath();
    lctx.moveTo(LCX,LCY);
    lctx.lineTo(sx,sy);
    lctx.strokeStyle=satColors[i];
    lctx.lineWidth=2.5;
    lctx.lineCap='round';
    lctx.stroke();

    lctx.beginPath();
    lctx.arc(sx,sy,10,0,Math.PI*2);
    lctx.fillStyle=satColors[i];
    lctx.fill();

    lctx.beginPath();
    lctx.arc(sx,sy,5,0,Math.PI*2);
    lctx.fillStyle=satHighlight[i];
    lctx.fill();

    lctx.beginPath();
    lctx.arc(sx,sy,10,0,Math.PI*2);
    lctx.strokeStyle='rgba(130,177,255,0.35)';
    lctx.lineWidth=2;
    lctx.stroke();

    lctx.restore();
  }

  lctx.save();
  lctx.globalAlpha=easeOut(Math.max(0,(p-0.2)*1.5));
  lctx.beginPath();
  lctx.arc(LCX,LCY,7,0,Math.PI*2);
  lctx.fillStyle='#5ea8f8';
  lctx.fill();
  lctx.beginPath();
  lctx.arc(LCX,LCY,3.5,0,Math.PI*2);
  lctx.fillStyle='#d0e8ff';
  lctx.fill();
  lctx.restore();

  const glowP=easeOut(Math.max(0,(p-0.2)*1.5));
  if(glowP>0){
    lctx.save();
    lctx.globalAlpha=glowP*0.4;
    const gg=lctx.createRadialGradient(LCX,LCY,0,LCX,LCY,90);
    gg.addColorStop(0,'rgba(41,121,255,0.5)');
    gg.addColorStop(0.4,'rgba(41,121,255,0.15)');
    gg.addColorStop(1,'rgba(41,121,255,0)');
    lctx.beginPath();
    lctx.arc(LCX,LCY,90,0,Math.PI*2);
    lctx.fillStyle=gg;
    lctx.fill();
    lctx.restore();
  }
}

let fxParticles=[];
function spawnBurst(){
  for(let i=0;i<24;i++){
    const a=Math.random()*Math.PI*2;
    const sp=Math.random()*3+1;
    fxParticles.push({x:fxc.width/2,y:fxc.height/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:Math.random()*2+1,color:Math.random()<0.5?'41,121,255':'0,229,255'})
  }
}

function drawFx(){
  fctx.clearRect(0,0,fxc.width,fxc.height);
  for(let i=fxParticles.length-1;i>=0;i--){
    const p=fxParticles[i];
    fctx.beginPath();
    fctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    fctx.fillStyle=`rgba(${p.color},${p.life*0.8})`;
    fctx.fill();
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.97; p.vy*=0.97;
    p.life-=0.022;
    if(p.life<=0) fxParticles.splice(i,1);
  }
  requestAnimationFrame(drawFx);
}
drawFx();

let startTime=null;
const INTRO_DUR=2200;

function loop(ts){
  if(!startTime) startTime=ts;
  const el=ts-startTime;
  introProgress=Math.min(el/INTRO_DUR,1);
  angle+=0.009;
  drawLogo(introProgress);

  if(introProgress>=0.75 && !document.getElementById('brand-block').classList.contains('show')){
    document.getElementById('brand-block').classList.add('show');
    setTimeout(()=>{
      document.getElementById('divLine').classList.add('expand');
      document.getElementById('tagLine').classList.add('show');
    },400);
    setTimeout(()=>{
      document.querySelectorAll('#corner-tl,#corner-tr,#corner-bl,#corner-br').forEach(e=>e.classList.add('corner-show'));
      document.getElementById('status-bar').classList.add('show');
    },800);
    spawnBurst();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

fxc.addEventListener('click',spawnBurst);
</script>
